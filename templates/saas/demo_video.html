{% extends 'base.html' %}
{% load static %}

{% block title %}Demo Video - CleaningBiz AI{% endblock %}

{% block content %}
<div style="background-color: #f4f5f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;">
    
    <!-- Logo Section -->
    <div style="margin-bottom: 30px;">
        <a href="{% url 'landing-page' %}">
            <!-- Ensure you have a logo image or text -->
            <img src="{% static 'img/logo_dark.png' %}" alt="CleaningBiz AI" style="max-height: 50px;">
        </a>
    </div>

    <!-- White Card -->
    <div style="background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 40px; max-width: 800px; width: 100%; text-align: center;">
        
        <h1 style="color: #4361ee; font-size: 24px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase;">
            Thanks for Signing Up!
        </h1>
        
        <!-- Video Embed -->
        <div style="max-width: 640px; margin: 0 auto 30px auto;">
            <div style="padding:56.25% 0 0 0;position:relative;">
                <iframe src="https://player.vimeo.com/video/1120738531?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="CB AI Tutorial"></iframe>
            </div>
            <script src="https://player.vimeo.com/api/player.js"></script>
        </div>

        {% if not user.is_authenticated %}
        <div style="margin-top: 25px;">
            <a href="{% url 'accounts:signup' %}" class="btn btn-primary btn-lg" style="padding: 12px 35px; font-weight: 600; font-size: 16px; border-radius: 8px;">
                Create Your Free Account
            </a>
        </div>
        {% endif %}
        
    </div>

    <!-- Footer link / Copyright -->
    <div style="margin-top: 30px; color: #888; font-size: 12px;">
        &copy; {% now "Y" %} CleaningBiz AI - All rights reserved.
    </div>

</div>
{% endblock %}
